# Configure via .env (cp .env.example .env). Then: ./build.sh && docker compose up -d
services:
  ds4:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DS4_GIT_COMMIT: ${DS4_GIT_COMMIT:-unknown}
        DS4_CUDA_VERSION: ${DS4_CUDA_VERSION:-unknown}
        DS4_CUDA_ARCH: ${DS4_CUDA_ARCH:-sm_110}
        DS4_MODEL_FILE: ${DS4_MODEL_FILE:-unknown}
        DS4_MODEL_SIZE: ${DS4_MODEL_SIZE:-unknown}
        DS4_BUILD_DATE: ${DS4_BUILD_DATE:-unknown}
    image: ds4-thor:local
    container_name: ds4
    runtime: nvidia
    restart: unless-stopped
    ports:
      - "${DS4_PORT:-8000}:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ${CUDA_DIR:-/usr/local/cuda}:/usr/local/cuda:ro          # host CUDA runtime libs
      - ${MODEL_PATH:?set MODEL_PATH in .env}:/models/model.gguf:ro   # your GGUF model
      - ${KV_DIR:-./kv-cache}:/kv-cache                          # persistent disk KV
      - ${LOG_DIR:-./logs}:/logs                                 # optional --trace output
    command:
      - --cuda
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - -c
      - "${DS4_CTX:-65536}"
      - -m
      - /models/model.gguf
      - --kv-disk-dir
      - /kv-cache
      - --kv-disk-space-mb
      - "${KV_BUDGET_MB:-16384}"
      - --kv-cache-cold-max-tokens
      - "${KV_COLD_MAX:-65000}"
      - --kv-cache-reject-different-quant
      # Enable request tracing (grows fast): add  --trace  /logs/ds4.trace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 240s   # cold model load ~100 s+

# To route a gateway (LiteLLM etc.) by name, put both on one external network:
# networks: [shared]  (add under the service) + a top-level networks: { shared: { external: true, name: <net> } }
